name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - rid: win-x64
            artifact: db-win-x64.zip
          - rid: osx-arm64
            artifact: db-osx-arm64.zip
          - rid: linux-x64
            artifact: db-linux-x64.zip
          - rid: linux-arm64
            artifact: db-linux-arm64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish
        run: |
          dotnet publish DatabaseMcp.Cli/DatabaseMcp.Cli.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ./publish/${{ matrix.rid }}

      - name: Create archive
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            db-win-x64.zip/db-win-x64.zip
            db-osx-arm64.zip/db-osx-arm64.zip
            db-linux-x64.zip/db-linux-x64.zip
            db-linux-arm64.zip/db-linux-arm64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
